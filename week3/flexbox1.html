<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Oxygen:wght@300;400;700&display=swap');

        body {
            background-color: #f6f5f0;
        }

        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            max-width: 1024px;
            margin: 0 auto;
        }

        .project {
            background-color: #ffffff;
            padding: 10px;
            border-radius: 20px;

        }

        img {
            border-radius: 5px;
        }

        h2 {
            font-family: "oxygen";
            font-weight: bold;
            font-size: 23px;
            padding-left: 15px;
        }

        p {
            font-family: "oxygen";
            font-size: 14px;
            padding-left: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="project">
            <img src="image/building1.jpg" alt="Project Image" width="100%">
            <h2>Residental projects</h2>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="project">
            <img src="image/building2.jpg" alt="Project Image" width="100%">
            <h2>Commercial spaces</h2>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="project">
            <img src="image/building3.jpg" alt="Project Image" width="100%">
            <h2>Infrastructure works</h2>
            <p>We develop strong, reliable infrastructure for growing communities.</p>
        </div>
    </div>
</body>

</html>
