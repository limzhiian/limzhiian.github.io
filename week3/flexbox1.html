<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <style>
        body {
            background-color: #fffae4;
        }

        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            max-width: 1024px;
            margin: 0 auto;
        }

        .project {
            background-color: #ffffff;
            padding: 10px;
            border-radius: 20px;

        }

        img {
            border-radius: 5px;
        }

        h3 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 25px;
            font-weight: bold;
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: lighter;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="project">
            <img src="image/building1.jpg" alt="Project Image" width="100%">
            <h3>Residental projects</h3>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="project">
            <img src="image/building2.jpg" alt="Project Image" width="100%">
            <h3>Commercial spaces</h3>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="project">
            <img src="image/building3.jpg" alt="Project Image" width="100%">
            <h3>Infrastructure works</h3>
            <p>We develop strong, reliable infrastructure for growing communities.</p>
        </div>
    </div>
</body>

</html>
