<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1:Button</title>
</head>
<style>
    button.requestnow {
        background-color: rgb(0, 0, 0);
        color: rgb(253, 253, 253);
        padding: 11px 18px;
        font-family: Arial, sans-serif;
        font-size: 13px;
    }

    button.signup {
        background-color: rgb(84, 162, 87);
        color: rgb(253, 253, 253);
        padding: 8px 19px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 13px;
        border: 2px solid rgb(84, 162, 87);
        border-radius: 5px;

    }

    button.addtocart {
        background-color: rgb(249, 218, 74);
        color: rgb(0, 0, 0);
        padding: 8px 50px;
        font-family: Arial, sans-serif;
        font-weight: regular;
        font-size: 14px;
        border: 0px solid rgb(249, 218, 74);
        border-radius: 150px;
    }

    button.getstarted {
        background-color: rgb(115, 84, 173);
        color: rgb(253, 253, 253);
        padding: 8px 19px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 12px;
        border: 2px solid rgb(115, 84, 173);
        border-radius: 3px;
    }

    button.download {
        background-color: rgb(255, 255, 255);
        color: rgb(119, 124, 130);
        padding: 8px 19px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 12px;
        border: 1px solid rgb(119, 124, 130);
        border-radius: 3px;
    }

    button.applyoncompanywebsite {
        background-color: rgb(45, 101, 188);
        color: rgb(255, 255, 255);
        padding: 8px 21px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 13px;
        border: 0px solid rgb(45, 101, 188);
        border-radius: 150px;
    }

    button.save {
        background-color: rgb(255, 255, 255);
        color: rgb(45, 101, 188);
        padding: 8px 21px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 13px;
        border: 1px solid rgb(45, 101, 188);
        border-radius: 150px;
    }
</style>

<body>
    <button class="requestnow" type="button">Request Now</button>
    <button class="signup" type="button">Sign Up</button>
    <button class="addtocart" type="button">Add to Cart</button>
    <button class="getstarted" type="button">Get Started</button>
    <button class="download" type="button">Download</button>
    <button class="applyoncompanywebsite" type="button">Apply on Company Website</button>
    <button class="save" type="button">Save</button>

</body>


</html>
