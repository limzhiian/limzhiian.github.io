<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Positivus</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        .consultation {
            background-color: black;
            color: white;
            font-size: 15px;
            width: 220px;
            height: 55px;
            margin: 2px;
            border-radius: 8px;
            font-family: "Space Grotesk";
        }

        .request {
            color: black;
            font-size: 17px;
            width: 220px;
            height: 55px;
            margin: 2px;
            border-radius: 8px;
            border: 1px solid black;
            background-color: white;
            font-family: "Space Grotesk";
        }

        .bar {
            display: flex;
            width: 1440px;
            justify-content: center;
            gap: auto;
            padding: 30px;
            align-items: center;
        }

        .positivus {
            padding-right: 430px;
            padding-left: 50px;
            align-items: left;
            width: auto;
            height: 50px;
        }

        .selection {
            display: flex;
            font-family: "Space Grotesk";
            justify-content: space-evenly;
            gap: 40px;
            align-items: center;
            width: 800px;
        }

        .header {
            display: flex;
            width: 1440px;
            height: 450px;
            justify-content: space-between;
            align-items: flex-start;
            padding: 60px;
            gap: auto;
        }

        .content {
            width: 600px;
            height: auto;
            gap: 35px;
            font-family: "Space Grotesk";
            align-items: top;
            padding-left: 20px;
        }

        .illustration {
            width: 600px;
            height: 500px;
            padding-right: 45px;
        }

        .logos {
            display: flex;
            justify-content: space-between;
            padding: 70px;
            width: 1370px;
            mix-blend-mode: luminosity;
        }

        .digital {
            font-size: 20px;
        }

        .navigate {
            font-size: 60px;
        }
    </style>
</head>

<body>
    <div class="bar">
        <img class="positivus" src="image/positivus.png" height="50px">
        <div class="selection">
            <p>About us</p>
            <p>Services</p>
            <p>Use Cases</p>
            <p>Pricing</p>
            <p>Blog</p>
            <button class="request" type="button">Request a quote</button>
        </div>
    </div>

    <div class="header">
        <div class="content">
            <h1 class="navigate">Navigating the digital landscape for success</h1>
            <p class="digital">Our digital marketing agency helps businesses grow and succeed online through a range
                of services
                including
                SEO, PPC, social media marketing, and content creation.</p>
            <button class="consultation" type="button">Book a consultation</button>
        </div>
        <img class="illustration" src="image/Illustration.png" width="400">
    </div>

    <div class="logos">
        <img src="image/amazonlogo.jpg" width="100">
        <img src="image/dribblelogo.jpg" width="100">
        <img src="image/hubspotlogo.jpg" width="100">
        <img src="image/notionlogo.jpg" width="100">
        <img src="image/netflixlogo.jpg" width="100">
        <img src="image/zoomlogo.jpg" width="100">
    </div>
</body>

</html>
